version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  DD Task — MEAN Stack Docker Compose
#  Services: mongo | backend | frontend | nginx
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: dd-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: dd_db
    volumes:
      - mongo_data:/data/db
    networks:
      - dd-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Node.js / Express Backend ──────────────────────────────────────────────
  backend:
    image: ${DOCKERHUB_USERNAME:-yourdockerhubuser}/dd-task-backend:${IMAGE_TAG:-latest}
    container_name: dd-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      MONGO_URL: mongodb://mongo:27017/dd_db
      CORS_ORIGIN: "*"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - dd-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Angular Frontend ───────────────────────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USERNAME:-yourdockerhubuser}/dd-task-frontend:${IMAGE_TAG:-latest}
    container_name: dd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - dd-network

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: dd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - dd-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  dd-network:
    driver: bridge
